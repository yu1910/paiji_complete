# 机器类型配置文件
# 创建时间：2025-09-10 16:15:00
# 更新时间：2025-12-01 10:00:00
# 参考文档：docs/排机规则文档.md#数据量校验规则

# Nova X-10B 配置 (小容量高精度机器)
nova_x_10b:
  capacity: 380.0                    # GB 标称容量
  tolerance: 10.0                    # GB 容差范围
  buffer_strategy: "conservative"    # 保守缓冲策略
  max_large_libraries: 4            # 大文库数量限制
  preferred_library_size: 30.0       # GB 偏好文库大小
  overflow_threshold: 360.0          # GB 溢出预警阈值
  
  # 缓冲参数
  base_buffer: 0.95                  # 基础缓冲因子 (5%余量)
  dynamic_range: 0.02                # 动态调整范围 ±2%
  max_utilization: 0.92              # 最大利用率 92%
  
  # 性能参数
  throughput_factor: 1.0             # 吞吐量因子
  processing_efficiency: 0.95        # 处理效率
  maintenance_overhead: 0.02         # 维护开销 2%
  
  # 文库偏好配置
  preferred_data_types:
    - "临检"                         # 临床检测优先
    - "YC"                          # YC项目
  
  preferred_size_ranges:
    - min: 10                        # 最小10GB
      max: 30                        # 最佳30GB
      score: 1.0
    - min: 30
      max: 50                        # 可接受50GB
      score: 0.8
    - min: 5
      max: 10                        # 小文库可接受
      score: 0.6

# Nova X-25B 配置 (大容量高吞吐机器)
# 参考规则文档：Lane数据量970G-980G（PE150策略，目标975G，tolerance=5G）
nova_x_25b:
  capacity: 975.0                    # GB 标称容量 - PE150策略目标975G
  tolerance: 5.0                     # GB 容差范围 - PE150策略±5G（970G-980G）
  buffer_strategy: "adaptive"        # 改为自适应策略以应对巨大容量变异
  max_large_libraries: 15           # 增加以支持超容量Lane(最多349个文库)
  preferred_library_size: 12.9       # GB 调整为生产数据平均值
  overflow_threshold: 990.0          # GB 溢出预警阈值 - PE150策略上限
  
  # 缓冲参数 - 根据生产数据巨大变异性调整
  base_buffer: 0.85                  # 基础缓冲因子 (15%余量) - 保守应对超容量
  dynamic_range: 0.15                # 动态调整范围 ±15% - 增加以适应变异
  max_utilization: 0.80              # 最大利用率 80% - 降低以防止超容量风险
  
  # 性能参数
  throughput_factor: 2.5             # 高吞吐量
  processing_efficiency: 0.98        # 高处理效率
  maintenance_overhead: 0.015        # 维护开销 1.5%
  
  # 文库偏好配置
  preferred_data_types:
    - "全基因组重测序"               # 大数据量项目优先
    - "单细胞文库"                   # 复杂项目
    - "其他"                         # 兜底处理
  
  preferred_size_ranges:
    - min: 80                        # 最佳80GB+
      max: 200
      score: 1.0
    - min: 50
      max: 80                        # 良好范围
      score: 0.8
    - min: 30
      max: 50                        # 中等文库
      score: 0.6

# 缓冲策略详细配置
buffer_strategies:
  conservative:
    description: "保守策略 - 适用于Nova X-10B"
    base_buffer: 0.95
    dynamic_range: 0.02
    max_utilization: 0.92
    risk_tolerance: "low"
    adjustment_sensitivity: 0.1        # 调整敏感度低
    
    # 动态调整规则
    utilization_thresholds:
      - threshold: 0.85
        action: "increase_buffer"
        adjustment: -0.02
      - threshold: 0.95
        action: "decrease_buffer"  
        adjustment: 0.01
    
    prediction_adjustments:
      high_confidence: 0.01            # 高置信度小幅增加利用率
      low_confidence: -0.03            # 低置信度大幅减少利用率
  
  aggressive:
    description: "激进策略 - 适用于Nova X-25B"
    base_buffer: 0.97
    dynamic_range: 0.03
    max_utilization: 0.95
    risk_tolerance: "medium"
    adjustment_sensitivity: 0.15       # 调整敏感度高
    
    # 动态调整规则
    utilization_thresholds:
      - threshold: 0.88
        action: "increase_buffer"
        adjustment: -0.02
      - threshold: 0.97
        action: "decrease_buffer"
        adjustment: 0.01
    
    prediction_adjustments:
      high_confidence: 0.02            # 高置信度更多利用容量
      low_confidence: -0.025           # 低置信度适中减少

# 文库适配评分权重配置
scoring_weights:
  nova_x_10b:
    data_volume: 0.40                  # 数据量权重最高
    priority: 0.25                     # 优先级重要
    data_type: 0.20                    # 数据类型匹配
    index_complexity: 0.15             # Index复杂度

  nova_x_25b:
    data_volume: 0.45                  # 数据量权重更高
    index_complexity: 0.25             # 复杂Index处理能力
    priority: 0.20                     # 优先级
    processing_requirements: 0.10      # 处理需求

# 性能监控配置
monitoring:
  metrics:
    - "utilization_rate"               # 利用率
    - "large_library_ratio"            # 大文库比例
    - "fit_score_distribution"         # 适配评分分布
    - "buffer_adjustment_frequency"    # 缓冲调整频次
    - "overflow_events"                # 溢出事件
  
  alerts:
    high_utilization:
      nova_x_10b: 0.90                 # 90%以上告警
      nova_x_25b: 0.93                 # 93%以上告警
    
    low_fit_score:
      threshold: 0.4                   # 低适配评分告警
      min_count: 3                     # 最少3个文库
    
    frequent_adjustments:
      threshold: 10                    # 10次以上调整告警
      time_window: 3600                # 1小时内

# 实验性功能
experimental:
  adaptive_learning:
    enabled: false                     # 自适应学习
    learning_rate: 0.1
    history_window: 100
  
  cross_machine_optimization:
    enabled: true                      # 跨机器优化
    load_balance_threshold: 0.15       # 负载差异15%触发
    migration_cost_factor: 0.1
  
  predictive_scaling:
    enabled: false                     # 预测性扩展
    forecast_horizon: 24               # 24小时预测
    confidence_threshold: 0.8