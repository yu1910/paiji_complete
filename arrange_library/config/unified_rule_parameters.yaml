# 统一规则参数配置
# 创建时间：2025-08-21 10:00:00
# 更新时间：2025-12-03 16:15:00
# 注意：必须与规则文档docs/排机规则文档.md保持一致

# =============================================================================
# AI模型配置
# =============================================================================
ai_models:
  scheduling_model:
    name: "Qwen3-32B"
    host: "localhost"
    port: 8080
    timeout: 60
    use_local: true
    health_check_interval: 300  # 健康检查间隔（秒）
    max_reconnect_attempts: 3
    reconnect_delay: 5.0
    min_confidence_threshold: 0.6  # 最低置信度阈值
  pooling_model:
    name: "Qwen3-1.5B"
    host: "localhost"
    port: 8081
    timeout: 30
    use_local: true
    health_check_interval: 300
    max_reconnect_attempts: 3
    reconnect_delay: 5.0
    min_confidence_threshold: 0.7

# =============================================================================
# 重试和熔断机制配置
# =============================================================================
retry_settings:
  max_retries: 3
  initial_delay: 1.0
  backoff_factor: 2.0
  max_delay: 30.0
  circuit_breaker:
    enabled: true
    failure_threshold: 5  # 触发熔断的连续失败次数
    recovery_timeout: 60  # 熔断恢复超时（秒）

# =============================================================================
# 优先级规则配置
# =============================================================================
priority_rules:
  # 临检文库前缀（优先级1）
  clinical_prefixes:
    - "FDYE"
    - "FDYT"
    - "FDYG"
    - "FDYP"
    - "FDYK"
    - "FDYX"
    - "FICR"
    - "FIPM"
  # YC文库前缀和关键词（优先级2）
  yc_prefixes:
    - "FKDL"
  yc_keywords:
    - "YC"
  # S级文库关键词（优先级3）
  s_level_keywords:
    - "SJ"
  # 紧急阈值（小时）
  urgent_threshold_hours: 72

# =============================================================================
# Lane容量配置
# =============================================================================
lane_capacities:
  non_1_0_mode:
    min: 980
    max: 990
    description: "非1.0模式Lane容量范围（Nova X-25B PE150策略）"
  1_0_mode_rna:
    min: 0
    max: 2175
    description: "1.0模式RNA专用Lane容量上限"
  1_0_mode_mixed:
    min: 0
    max: 2100
    description: "1.0模式混排Lane容量上限"
  package_lane:
    min: 999.99
    max: 1000.01
    target: 1000
    description: "包Lane容量范围（1000G±0.01G）"

# =============================================================================
# 1.0模式规则配置
# =============================================================================
mode_1_0_rules:
  # 项目名排除关键词（包含这些关键词的项目不能使用1.0模式）
  exclude_keywords:
    - "药企"
    - "医检所"
    - "医学"
    - "YC"
    - "SJ"
  # 文库类型排除列表
  exclude_types:
    - "外显子文库"
    - "HI-C文库"
    - "10X HD"
    - "10X ATAC"
  # 备注排除关键词
  remark_exclude_keywords:
    - "加测"
    - "混合"

# =============================================================================
# 碱基不均衡关键词配置
# =============================================================================
base_imbalance_keywords:
  # 主要识别关键词
  primary:
    - "NEB_ligation"
    - "single_cell"
    - "10X"
    - "NEB单细胞"
  # 附加识别关键词
  additional:
    - "ATAC"
    - "Cut&Tag"
    - "ChIP"
  # 碱基不均衡Lane最大占比
  max_lane_ratio: 0.8

# =============================================================================
# 特殊文库关键词配置
# =============================================================================
special_library_keywords:
  # 单细胞文库
  single_cell:
    - "单细胞"
    - "single_cell"
    - "10X"
    - "10x"
  # 临检文库
  lingjian:
    - "临检"
    - "FDYE"
    - "FDYT"
  # 外显子文库
  exome:
    - "外显子"
    - "WES"
    - "Exome"

# =============================================================================
# 客户比例验证配置
# =============================================================================
customer_ratio:
  max_ratio: 0.5
  violation_penalty: 0.1

# =============================================================================
# 利用率阈值配置
# =============================================================================
utilization_thresholds:
  # 优秀利用率区间
  excellent_min: 0.88
  excellent_max: 0.93
  # 合格利用率区间
  good_min: 0.85
  good_max: 0.95
  # 低载阈值
  underloaded_threshold: 0.85
  critical_underloaded_threshold: 0.70
  # 过载阈值
  overloaded_threshold: 0.95
  critical_overloaded_threshold: 1.0
  # 目标利用率
  target_utilization: 0.90

# =============================================================================
# Index验证配置
# =============================================================================
index_validation:
  enable_iupac_support: true
  enable_optimized_algorithm: true
  p5_strict_threshold: 2
  # P7重复限制（符合排机规则文档要求）
  # 参考文档：docs/排机规则文档.md#index重复校验规则-规则3
  p7_repeat_limits:
    6: 4   # 6bp Index: 重复不超过4位
    7: 5   # 7bp Index: 重复不超过5位（2024年11月21日补充）
    8: 6   # 8bp Index: 重复不超过6位
    10: 7  # 10bp及以上Index: 重复不超过7位
    12: 7  # 12bp Index: 重复不超过7位

# =============================================================================
# 负载均衡配置
# =============================================================================
load_balancing:
  emergency_threshold: 1.0
  target_utilization: 0.9
  tolerance_range: 0.05

# =============================================================================
# Peak Size验证配置
# =============================================================================
peak_size:
  data_volume_threshold: 0.75
  range_tolerance: 150
  strict_mode: true

# =============================================================================
# 质量控制配置
# =============================================================================
quality_control:
  min_quality_threshold: 0.85
  target_accuracy: 0.95

# =============================================================================
# Pooling规则配置
# =============================================================================
pooling_rules:
  # 默认系数范围
  default_coefficient_range:
    min: 0.3
    max: 3.0
    default: 1.0
  # 数据量调整因子
  data_volume_adjustment:
    small_threshold: 10  # 小数据量阈值（G）
    large_threshold: 100  # 大数据量阈值（G）
    small_factor: 1.2  # 小数据量调整因子
    large_factor: 0.8  # 大数据量调整因子
  # 特殊类型调整
  special_type_adjustment:
    single_cell: 0.9
    rna: 1.1
    dna: 1.0

# =============================================================================
# 数据分布分析阈值配置
# =============================================================================
distribution_analysis:
  # 大数据量阈值
  large_data_threshold: 70  # G
  # 碱基不均衡警告阈值
  base_imbalance_warning_ratio: 0.3
  # 碱基不均衡紧急阈值
  base_imbalance_critical_ratio: 0.5
  # 1.0模式推荐阈值
  mode_1_0_recommend_ratio: 0.4

# =============================================================================
# 加测比例验证配置
# =============================================================================
add_test_ratio:
  max_ratio: 0.5
  warning_threshold: 0.3
  keywords:
    - "加测"
    - "add_test"
    - "retest"

# =============================================================================
# 文档同步信息
# =============================================================================
documentation:
  source_file: "docs/排机规则文档.md"
  last_sync_date: "2025-12-03"
  sync_notes: "完善AI模型配置、重试机制、优先级规则、Lane容量、1.0模式规则等配置项"
