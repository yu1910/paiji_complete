  - rule_id: "R10"
    rule_name: "Pooling与下单比例控制"
    description: "Lane下单量/合同量<115%，单文库下单量≥1G，单端Index占比<30%"
    priority: "medium"
    compliance_target: 0.90
    doc_section: "Pooling系统规则"
    doc_reference: "docs/排机规则文档.md#pooling系统规则"
    details:
      pooling_adjustment_rule:
        rule_type: "可变规则"
        update_frequency: "每月1次调整"
        adjustment_reason:
          - "合同数据量与真实产出存在差异"
          - "需要对合同数据量进行人为系数调整"
        adjustment_method:
          - "人工调整，总结过去1个月某类文库产出与合同数据量的差异"
          - "给相应文库及其合同区间给定系数"
      pooling_calculation:
        rule_type: "固定规则"
        formula: "下单量 = 合同量 × Pooling系数"
        single_sample_limits:
          min_order_amount: 1.0  # GB
          max_difference: 30.0  # GB，下单数据量 - 合同数据量 < 30G
        lane_level_limits:
          max_ratio: 0.15  # Lane总下单数据量 / Lane总合同数据量 < 115% 即增量 < 15%
      volume_adjustment_rule:
        rule_type: "固定规则"
        calculation_parameters:
          - "下单量：基于合同量和Pooling系数"
          - "QPCR摩尔浓度：文库特征参数"
          - "上机浓度：固定值"
          - "体系总体积：有调整标准"
        volume_rules:
          - "样本体积必须遵守的规则（参考S/Z体积限制）"
          - "形成加样的样本体积有必须遵守的规则"
      order_data_ratio_limit:
        rule_id: "规则10"
        rule_type: "固定规则"
        limit: 0.15  # 下单数据量/合同数据量 < 115% 即增量 < 15%
        note: "下单数据量占比限制规则。加测文库比例限制见R5A规则"
        definition: "下单数据量/合同数据量 < 115%的限制规则"
      pooling_coefficient_adjustment:
        rule_id: "规则11"
        rule_type: "固定规则"
        validation_type: "人工核对"
        limits:
          - "单文库最小下单数据量 ≥ 1G"
          - "下单数据量 - 合同数据量 < 30G"

  - rule_id: "R11"
    rule_name: "优先级档位执行"
    description: "临检>YC>S级>交付临近>其他，遵循数据类型55%+交付时间45%权重（数据类型优先）"
    priority: "high"
    compliance_target: 0.95
    doc_section: "优先级排机规则"
    doc_reference: "docs/排机规则文档.md#优先级排机规则"
    details:
      data_type_priority:
        rule_type: "固定规则"
        purpose: "用于筛选通道和检验的文库，按数据类型标签分类"
        priority_classification:
          - priority: 1
            name: "临检"
            description: "最高优先级"
          - priority: 2
            name: "YC"
            description: "中等优先级"
          - priority: 3
            name: "S级客户"
            description: "特殊客户优先级"
          - priority: 4
            name: "交付临近"
            description: "时间紧急优先级"
          - priority: 5
            name: "其他"
            description: "普通优先级"
      priority_1_clinical:
        library_identification:
          prefix_4_chars:
            - "FDYE"
            - "FDYT"
            - "FDYG"
            - "FDYP"
            - "FDYK"
            - "FDYX"
            - "FICR"
            - "FIPM"
          international_clinical:
            - country: "英国"
              prefix: "E"
              description: "英国临检文库首字母为E"
            - country: "美国"
              prefix: "C"
              description: "美国临检文库首字母为C"
        scheduling_process:
          - step: 1
            action: "优先生成临检Lane"
            description: "优先将临检文库生成N条完整Lane，进入排机池"
          - step: 2
            action: "不足一条Lane时的补充策略"
            description: |
              优先补充"其他"池子的DHE、DHG文库（"其他"指非临检及YC，剩余全部为其他）
              其次按顺序补充手工诺禾碱基均衡文库：按校准后交付时间排序
          - step: 3
            action: "剩余处理"
            description: "补充文库后，仍有剩余的临检文库不够一条Lane，则留在文库池等待下次排机"
          - step: 4
            action: "大小数据量混排"
            description: "临检文库大于70G和小于70G的文库排机规则相同，且可以同Lane排机"
        same_priority_sorting: "按下单时间升序"
      priority_2_yc:
        library_identification:
          prefix_4_chars: "FKDL"
          subproject_name: "带YC标识的文库"
        large_data_definition: "单个index合同数据量 > 70G的文库"
        scheduling_process:
          - step: 1
            action: "优先处理碱基不均衡大数据量"
            description: "优先挑出碱基不均衡的大数据量文库，按照排机规则生成整N条Lane"
          - step: 2
            action: "不足Lane时的补充"
            description: "补充当前档位（YC）的碱基均衡大数据量文库，生成整N条Lane"
          - step: 3
            action: "剔除至整数Lane"
            description: "补充后仍不够整N条Lane，则剔除大数据文库至整数Lane（碱基不均衡+碱基均衡）"
            removal_order: "优先级从低到高，数据量从小到大"
          - step: 4
            action: "文库拆分"
            description: "将大数据量文库（剔除的文库）拆分成小数据量"
          - step: 5
            action: "小数据量排机"
            description: "拆分后，将小数据量文库按照碱基不均衡文库、碱基均衡文库的顺序，根据排机规则依次生成1条Lane、2条Lane、3条Lane..."
        special_rules_9_26_discussion:
          - "YC档位都是紧急，其他档位分紧急、不紧急（按扣减规则）"
          - "只按碱基不均衡大数据量文库包Lane排"
          - "找下一档位大数据量文库凑时，凑够1条Lane即可"
          - examples:
              - "YC档位分组9数据量为2.6条Lane，则找其他档位紧急凑够3条Lane"
              - "其他档位紧急分组9数据量为1.6条Lane，则找其他不紧急文库凑够2条Lane"
          - "如果差的数据量少，可以找一个同类型的小数据量文库凑近"
          - "先用大数据量凑、再用小数据量凑"
          - "小数据量从大到小排序，平分后单个文库数据量大于2G"
          - "如果没有能凑的数据量、多出来数据量，可以拆出来数据量"
        same_priority_sorting: "按下单时间升序"
      priority_3_s_level:
        library_identification:
          project_name: "带SJ标识"
          manual_selection: "批次/文库编号/子项目编号/子项目名称，人工填写信息后，系统自动勾选"
        large_data_definition: "合同数据量 > 70G的文库"
        scheduling_process:
          - step: 1
            action: "优先处理碱基不均衡大数据量"
            description: "优先挑出碱基不均衡的大数据量文库，按照排机规则生成整N条Lane"
          - step: 2
            action: "不足Lane时的补充"
            description: "补充当前档位的碱基均衡大数据量文库，生成整N条Lane"
          - step: 3
            action: "剔除至整数Lane"
            description: "补充后仍不够整N条Lane，则剔除大数据文库至整数Lane"
            removal_order: "优先级从低到高，数据量从小到大"
          - step: 4
            action: "文库拆分"
            description: "将大数据量文库（剔除的文库）拆分成小数据量"
          - step: 5
            action: "小数据量排机"
            description: "拆分后，将小数据量文库按照碱基不均衡文库、碱基均衡文库的顺序，根据排机规则依次生成Lane"
        special_considerations:
          - "拆分成小数据量文库 > 临近交付（临近交付时间规则表）"
          - "同板文库优先级相同（按该板剩余文库中交付时间最早的文库来）"
          - "在操作人账号下-排机池界面的文库 > 在选择文库池的文库"
        same_priority_sorting: "按下单时间升序"
      priority_4_delivery_urgent:
        sorting_rule: "按校准后交付时间升序"
