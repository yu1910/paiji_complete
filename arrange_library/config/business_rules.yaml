# 上机浓度规则
# 更新时间: 2025-11-26
loading_concentration:
  # 碱基不均衡包Lane（文库名包含10×3'或10×5'的碱基不均衡文库的包Lane）
  base_imbalance_package_lane: 2.5
  # 碱基不均衡散样混排
  base_imbalance_mixed: 1.78
  # 含临检文库的Lane
  clinical_lane: 2.3
  # 默认浓度
  default: 1.5

# Pooling系数调整规则
# 更新时间: 2025-11-26
pooling_adjustment:
  # 下单数据量 < 1G 时的调整
  min_order_amount: 1.0  # GB
  min_order_coefficient_range:
    min: 1.5
    max: 2.0
  # 下单量 > 2×合同量 时的调整
  max_order_ratio: 2.0
  max_order_coefficient_range:
    min: 1.3
    max: 2.0

