      key_points:
        - "Lane数据量根据机器类型和产出均一性定期调整（约半月一次）"
        - "总数据量按合同数据量进行计算"
        - "不同优先级档位（临检、YC、其他）有不同的数据量要求"
        - "临检和YC文库根据lane中该类型文库数据量调整合同数据量标准"
        - "特殊文库类型（10X、甲基化等）有专门的数据量配置"
        - "产线文库类型：S（管式文库，手工诺禾池子）、Z（板式文库，自动线池子）、ZS（混合）"
        - "所有工序均标记为'可混'，表示可以与其他文库混排"

  - rule_id: "R2"
    rule_name: "客户/诺禾混排占比"
    description: "存在诺禾文库时，客户文库数据量≤50%，客户文库以FKDL开头"
    priority: "critical"
    compliance_target: 1.0
    doc_section: "文库混排规则"
    doc_reference: "docs/排机规则文档.md#客户诺禾混排占比校验-规则2"
    details:
      rule_type: "改为红线规则，不超过红线即可"
      applicable_processes:
        - "Novaseq T7"
        - "Novaseq PE150"
        - "Novaseq SE50"
        - "Novaseq PE250"
        - "SURFSEQ PE150"
      customer_library_prefix: "FKDL"
      max_ratio: 0.5
      library_classification:
        customer_library:
          definition: "样本编号以FKDL开头的（按照'样本类型'区分）"
          identification: "按排机-文库池手工客户进行区分"
        novogene_library:
          definition: "非FKDL的文库"
          types:
            - type: "Z型"
              description: "板式文库，在自动线池子"
            - type: "S型"
              description: "管式文库，在手工诺禾池子"
      rules:
        - "整条Lane都是客户文库时，无需考虑客户文库占比"
        - "若存在诺禾文库时，要保证客户文库数据量不超过Lane数据量的50%"
        - "客户文库数据量不能超过Lane数据量的50%"

  - rule_id: "R3"
    rule_name: "Index重复校验"
    description: "P7端：6bp→4重复，8bp→6重复，10bp+→7重复；P5端特殊处理"
    priority: "critical"
    compliance_target: 1.0
    doc_section: "Index重复校验"
    doc_reference: "docs/排机规则文档.md#index重复校验规则-规则3"
    details:
      rule_type: "固定规则，同算法"
      purpose: "确保一条Lane中的Index序列不重复，保证后期数据拆分"
      rule_description:
        - "纯算法规则，要确保一条lane中的index序列不重复，不然后期无法拆分数据"
        - "按静态数据区分Index重复校验规则（正向/反向）"
        - "Index是建库过程引入的用来区分文库的标签"
        - "通过为每个样本添加不同的Index，可在单次测序中同时处理多个样本"
        - "测序完成后，通过识别Index序列将混合数据按样本拆分，生成独立的测序文件"
        - "Index有双端index和单端index，按照碱基个数又分成6碱基、7碱基、8碱基以及10碱基"
        - "为了能最保证拆分，排机时需要校验index序列是否重复，保证至少有两位碱基不同，即可拆分开来"
        - "例如：6和8碱基最多可重复4位，8和8碱基最多可重复6个均可同lane上机"
      p7p5_check_rules:
        p7_check:
          description: "当前文库Index与Lane中其他所有文库Index的P7端进行两两比对"
          limits:
            - length: 6
              max_repeat: 4
            - length: 7
              max_repeat: 5
              note: "2024年11月21日补充"
            - length: 8
              max_repeat: 6
            - length: "大于8"
              max_repeat: 7
        pe_adapter_repeat:
          description: "当前Index的P7端等于PE且比对的另一个Index的P7端也等于PE时，算PE转接头重复"
        p5_check:
          description: "P7超过固定重复位时需校验P5端"
          conditions:
            - "如果P5端等于通用接头，比对组合中P5端也等于通用接头的，算重复"
            - "如果P5端等于随机INDEX/RANDOM PRIMERS，算重复"
            - "P5端校验规则与P7端相同"
      p7_only_check_rules:
        description: "仅校验P7端"
        limits:
          - length: 6
            max_repeat: 4
          - length: 7
            max_repeat: 5
            note: "2024年11月21日补充"
          - length: 8
            max_repeat: 6
          - length: "大于8"
            max_repeat: 7

  - rule_id: "R4"
    rule_name: "RunCycle一致性"
    description: "同Lane内文库RunCycle必须一致"
    priority: "high"
    compliance_target: 0.95
    doc_section: "特殊处理标签"
    doc_reference: "docs/排机规则文档.md#特殊处理标签"
    details:
      rule_type: "固定规则"
      requirement: "同Lane内RunCycle必须一致"
      definition: "RunCycle编号：测序参数备注，相同RunCycle排同一Lane"
      flexibility: "可打破的固定规则"
      related_labels:
        - "包Lane与否：指定文库是否独立成Lane"
        - "Lane ID：指定Lane编号，相同编号文库排同一Lane"
        - "FC编号：Flow Cell编号，相同FC编号组成Run"
        - "上机备注：特殊需求说明"
      combination_rules:
        - "相同编号的文库排在同一条Lane上"
        - "相同编号成Lane"
        - "相同FC成Run"

  - rule_id: "R5"
    rule_name: "Peak Size一致性"
    description: "同Lane内Peak Size差异≤150bp或≥75%数据量相近"
    priority: "medium"
    compliance_target: 0.90
    doc_section: "文库混排规则"
    doc_reference: "docs/排机规则文档.md#peak-size数据量校验-规则6"
    details:
      rule_type: "红线规则"
      definition: "Peak Size是文库上机前质检测定的峰图片段大小"
      conditions:
        - condition: "最大值 - 最小值 ≤ 150bp"
        - condition: "数据量 ≥ 总数据量的75%"
      note: "两个条件需要同时考虑，满足其一即可通过校验"
  
  - rule_id: "R5A"
    rule_name: "加测文库比例限制"
    description: "同一条Lane中，加测文库的合同数据量占比必须≤25%且允许额外10G缓冲"
    priority: "medium"
    compliance_target: 0.90
    doc_section: "文库混排规则"
    doc_reference: "docs/排机规则文档.md#加测文库比例限制"
    details:
      rule_type: "固定规则"
      rule_content: "同一条 Lane 中，加测文库的合同数据量占比必须 ≤ 25% 且允许额外 10G 缓冲。当 Lane 中出现超额时需回退并重新组合"
      max_ratio: 0.25
      buffer: 10  # GB
      validation: "当Lane中出现超额时需回退并重新组合"
      definition: "加测文库指加测备注是「加测」这部分文库"

  - rule_id: "R6"
    rule_name: "单端Index数据占比"
    description: "单端Index文库数据量占比<30%"
    priority: "medium"
    compliance_target: 0.85
    doc_section: "Index重复校验"
    doc_reference: "docs/排机规则文档.md#单端index文库数据量比例-规则5"
    details:
      rule_type: "固定规则，同算法"
      data_source: "实验总结值"
      definition: "Index序列只有P7端没有P5端称为单端Index（Index序列字段没有';'存在的）"
      conditions:
        - condition: "Lane中全部都是单端Index，不限制比例"
        - condition: "Lane中同时排有单端Index的文库和双端Index的文库，限制单端Index文库的合同数据量占整条Lane文库合同数据量 < 30%"
      max_ratio: 0.3

  - rule_id: "R7"
    rule_name: "碱基不均衡文库处理"
    description: "天津实验室特殊文库类型分组规则和占比限制"
    priority: "high"
    compliance_target: 0.90
    doc_section: "碱基不均衡文库处理"
    doc_reference: "docs/排机规则文档.md#碱基不均衡文库处理"
    details:
      rule_type: "固定规则（碱基不均衡包lane规则同算法）；碱基不均衡混排优化为几种类型排机限制"
      strategy:
        - "优先：碱基不均衡文库包Lane排机"
        - "其次：碱基不均衡+碱基均衡文库混排"
      special_restrictions:
        - "遗传实验室的碱基不均衡文库只能散样安排，不包Lane"
        - "临检实验室不存在碱基不均衡文库"
      max_ratio_when_mixed:
        normal_scenario: 0.4
        note_normal: "常规场景：碱基不均衡文库数据量占比 < 40%（可能年度调整）"
        mode_3_6t_new: 0.3
        note_3_6t_new: "3.6T-NEW 模式散样排机：碱基不均衡文库数据量不得超过 30%，并且仍需满足特殊文库总量限制"
      total_library_types_limit: 3
      update_records:
        - date: "2024.11.21"
          changes:
            - "碱基不均衡文库最大数据量从190G更新为240G（Novaseq X Plus-PE150 25B）"
            - "特殊文库总量从190更新为240（Novaseq X Plus-PE150 25B上机方式）"
      grouping_principles:
        - "同组内优先规则：同一组内，优先同文库类型包Lane；其次考虑混排包Lane"
        - "同类型排整条Lane：大多数碱基不均衡文库不可与其他碱基不均衡文库同Lane"
        - "特殊分组混排：仅分组27(3')、分组28(5')、分组29允许同组内混排"
      tianjin_lab_nova_x_25b_groups:
        - group: 1
          library_type: "ATAC-seq文库"
          data_ratio: 0.8
          note: "不可与其他碱基不均衡文库同Lane"
        - group: 2
          library_type: "CUT Tag文库（动物组织）"
          data_ratio: 0.8
