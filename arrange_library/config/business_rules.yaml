  - rule_id: "R8"
    rule_name: "10碱基Index占比"
    description: "同Lane含10bp与非10bp混排时，10bp文库数据量需>40%且≤60%"
    priority: "high"
    compliance_target: 0.95
    doc_section: "Index重复校验"
    doc_reference: "docs/排机规则文档.md#10碱基index文库数据量比例-规则4"
    details:
      rule_type: "固定规则，同算法"
      data_source: "实验经验总结"
      definition:
        - "10碱基是指index序列字段碱基数是10个的文库"
        - "10碱基Index：包括单端和双端"
        - "仅看Index P7端长度"
        - "示例：10碱基index：AAAGGGCCTT; AAAGGG     6碱基index：AAAGGG; AAAGGGCCTT"
        - "一个文库含多index的，包含10碱基index则该文库数据量都算作10碱基的数据量"
        - "如：文库数据量为10G，该文库同时含有6、8、10碱基index，则算作10碱基index数据量为10G（仅看IndexP7端长度）"
      conditions:
        - condition: "Lane中只含10碱基文库时，不做限制"
        - condition: "Lane中只含非10碱基文库时，也不做限制"
        - condition: "Lane中含10碱基和非10碱基时，10碱基Index的文库数据量 > 40%（非10碱基文库数据量 < 60%）"
      min_ratio: 0.4
      max_ratio: 0.6

