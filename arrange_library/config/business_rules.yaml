      time_priority:
        rule_type: "固定规则"
        sorting_rules:
          - rule: "下单时间"
            description: "越早下单越优先排机"
          - rule: "交付时间"
            description: "离当前时间越近越优先排机（校准后交付时间）"
          - rule: "样本编码"
            description: "包含扣减时间规则的样本优先处理"
        weight_distribution:
          order_time: 0.4
          delivery_time: 0.35
          data_type: 0.25
      large_vs_small_data_definition:
        large_data_libraries:
          - type: "YC文库"
            definition: "单个index合同数据量 > 70G"
          - type: "S级客户文库"
            definition: "合同数据量 > 70G"
          - type: "临检文库"
            definition: "大于70G与小于70G可同Lane排机"
        small_data_libraries:
          - "合同数据量 ≤ 70G的文库"
          - "拆分后的文库（要求单个文库数据量 > 2G）"
        splitting_rules:
          - "大数据量文库拆分成小数据量文库"
          - "拆分后单个文库数据量必须 > 2G"
          - "小数据量从大到小排序进行排机"

  - rule_id: "R12"
    rule_name: "特殊混排禁忌"
    description: "Visium/ATAC等碱基不均衡文库遵循分组限制，禁与指定文库同Lane"
    priority: "critical"
    compliance_target: 1.0
    doc_section: "碱基不均衡文库处理"
    doc_reference: "docs/排机规则文档.md#碱基不均衡排机限制固定规则"
    details:
      rule_type: "固定规则"
      forbidden_combinations:
        - library: "10x HD Visium空间转录组文库(新)"
          also_applies_to: "10x HD Visium空间转录组文库"
          forbidden_with:
            - "10X转录组-3'文库"
            - "10X转录组-3'膜蛋白文库"
            - "墨卓转录组-3端文库"
        - library: "10X ATAC文库"
          forbidden_with:
            - "10x_cellranger拆分方式的文库"
          note: "不排同Run"

  - rule_id: "R13"
    rule_name: "S/Z取样体积限制"
    description: "S类型文库取样体积≥0.3μL，Z类型文库取样体积≤5000nL，成Lane后校验"
    priority: "high"
    compliance_target: 0.95
    doc_section: "机器类型相关规则"
    doc_reference: "docs/排机规则文档.md#sz最大最小取样体积限制-规则8"
    details:
      volume_limits:
        - library_type: "S"
          min_volume_ul: 0.3
          note: "管式文库，在手工诺禾池子"
        - library_type: "Z"
          max_volume_nl: 5000
          note: "板式文库，在自动线池子"
      calculation_formula: "取样体积 = 样本数据量占比 × 排机浓度 × 总体积 ÷ 样本浓度"
      validation_timing: "成Lane后进行计算和校验"
      update_frequency: "一年一次，不同实验室值不同"
      note: "计算时可以把不符合规则的文库，通过算法符合要求，基本不影响成Lane"

  - rule_id: "R14"
    rule_name: "上机备注与特殊需求处理"
    description: "处理特殊需求：批次组合、避开特定物种、指定测序参数、分Run排机等"
    priority: "high"
    compliance_target: 0.95
    doc_section: "机器类型相关规则"
    doc_reference: "docs/排机规则文档.md#上机备注run-cycle-规则9"
    details:
      special_requirements:
        - type: "批次组合"
          description: "A批次X个样本+B批次Y个样本，同Lane/同Run排机"
        - type: "避开特定物种"
          description: "避开特定物种排机"
        - type: "指定测序参数"
          description: "151+10+24+151/R1 index10, R2 index24"
        - type: "分Run排机"
          description: "指定不同机器的分Run排机"
      validation_type: "人工核对"
      note: "RunCycle一致性已在R4中覆盖，本规则主要处理其他特殊需求"

  - rule_id: "R15"
    rule_name: "数据时间消耗周期"
    description: "数据消耗周期约20个工作日，当天数据优先消耗，超过20天的数据忽略不计"
    priority: "medium"
    compliance_target: 0.90
    doc_section: "数据时间消耗周期规则"
    doc_reference: "docs/排机规则文档.md#数据时间消耗周期规则-规则12"
    details:
      rule_type: "固定规则"
      rule_number: "规则12"
      core_principle:
        - "每日下单的文库数据不会在当日完全消耗，而是在后续排机中逐步安排"
        - "数据消耗遵循时间递减模式：当天数据利用最多，然后逐渐减少"
      consumption_cycle_features:
        standard_cycle_days: 20
        consumption_mode: "当天数据优先消耗，后续各天消耗量逐渐递减"
        data_status: "超过20天的剩余数据忽略不计"
      rule_application:
        - "排机系统优先选择较新的下单数据进行排机"
        - "同等条件下，时间较近的数据具有更高的被选中概率"
        - "随着数据时间增长，其在排机中的权重逐步降低"
        - "数据超过20天期限后不再参与排机计算"
      influencing_factors:
        - "文库优先级（临检 > YC > 其他）"
        - "机器类型容量限制"
        - "Index冲突检测结果"
        - "特殊文库包Lane需求"
      implementation_requirements:
        - "排机算法需要考虑数据的下单时间标签"
        - "实现基于时间的权重衰减机制"
        - "确保新数据优先得到排机机会"

  - rule_id: "R16"
    rule_name: "文库拆分规则"
    description: "1.1模式文库（兼容旧名1.0）不拆分；3.6T-NEW模式中，单index超过100G拆分，多index超过300G拆分；触发后优先按对半方式持续拆分，直到片段不超过阈值"
    priority: "high"
    compliance_target: 0.95
    doc_section: "文库标签分类规则"
    doc_reference: "docs/排机规则文档.md#文库拆分规则"
    details:
      rule_type: "固定规则（2025-11-26更新）"
      splitting_mode_distinction:
        mode_1_1:
          description: "1.1模式（兼容旧名1.0）"
          rules:
            - "文库不触发预拆分"
        mode_3_6t_new_single_index:
          description: "3.6T-NEW模式 + 单index"
          rules:
            - "合同量 >100G 时触发拆分"
        mode_3_6t_new_multi_index:
          description: "3.6T-NEW模式 + 多index 文库"
          rules:
            - "合同量 >300G 时触发拆分"
      splitting_conditions:
        - condition: "包Lane / 包FC / 指定 Lane 文库"
          action: "保持原有指定，不拆分"
        - condition: "阈值计算"
          formula: "1.1模式（兼容旧名1.0）=不拆分；3.6T-NEW模式单index=100G；3.6T-NEW模式多index=300G"
          examples:
            - "1.1模式（兼容旧名1.0）：不触发预拆分"
            - "3.6T-NEW模式单index：100G以内不拆，超过100G拆分"
            - "3.6T-NEW模式多index：300G以内不拆，超过300G拆分"
        - condition: "触发拆分"
          description: "当合同数据量严格大于对应阈值时，判定为「需拆分」"
        - condition: "拆分方式"
          description: "优先对半拆分（1→2→4→8），直到每个子片段不超过对应阈值；拆分后的每条子文库需要 >2G，除数据量外其他字段保持一致"
      splitting_impact:
        - "1.1模式文库（兼容旧名1.0）不参与预拆分"
        - "3.6T-NEW模式单index拆分阈值：100G"
        - "3.6T-NEW模式多index拆分阈值：300G"
        - "受样本取样体积影响时，可在保持「优先对半」原则下进行人工复核"

  - rule_id: "R21"
    rule_name: "标识类规则"
    description: "文库成Lane后的标识，与排机规则无关，仅用于后续数据处理"
    priority: "low"
    compliance_target: 1.0
    doc_section: "文库标签分类规则"
    doc_reference: "docs/排机规则文档.md#标识类规则"
    details:
      rule_type: "固定规则"
      purpose: "文库成Lane后的标识，与排机规则无关"
      identifier_rules:
        - "标识类标签仅用于文库测序完成后的数据处理"
        - "不参与排机逻辑判断"
        - "作为后续数据分析的分类标签"
      note: "此规则不参与排机逻辑，仅用于数据标识和后续分析"

  - rule_id: "R17"
    rule_name: "特殊处理标签规则"
    description: "包Lane、Lane ID、FC编号、RunCycle、上机备注等特殊标签的组合规则。包Lane前置校验：同一包Lane编号下文库合同数据量≥1000G且Index对数≥5才允许包Lane"
    priority: "high"
    compliance_target: 0.95
    doc_section: "文库标签分类规则"
    doc_reference: "docs/排机规则文档.md#特殊处理标签"
    details:
      rule_type: "固定规则"
      special_labels:
        - label: "包Lane与否"
          description: "指定文库是否独立成Lane"
        - label: "Lane ID"
          description: "指定Lane编号，相同编号文库排同一Lane"
        - label: "FC编号"
          description: "Flow Cell编号，相同FC编号组成Run"
        - label: "RunCycle编号"
          description: "测序参数备注，相同RunCycle排同一Lane"
        - label: "上机备注"
          description: "特殊需求说明"
      combination_rules:
        - "相同编号的文库排在同一条Lane上"
        - "相同编号成Lane"
        - "相同FC成Run"
      version_rule:
        rule_type: "可打破的固定规则"
        description: "相同版号的文库尽量排在同一Lane中，在满足其他约束条件下优先考虑版号一致性"
      package_lane_pre_validation:
        rule_type: "固定规则（2025-11-26补充）"
        requirements:
          - requirement: "数据量要求"
            description: "同一包Lane编号下的文库合同数据量必须达到 ≥1000G 才允许保持包Lane身份"
          - requirement: "Index对数要求"
            description: "仅当文库的 Index 对数 ≥ 5（即含有至少5对Index）时，包Lane才能建立即时调度"
          - requirement: "碱基不均衡限制"
            description: "碱基不均衡文库若申请包Lane，需同时满足所属分组的最大数据量（240G/150G/90G）与类型混排规则"
        validation_method: "在进入排机流程前，系统应先做包Lane校验，不满足条件的文库需自动解除包Lane标记并回到普通排机池"

  - rule_id: "R18"
    rule_name: "质量控制要求"
    description: "测序质量阈值、产出要求、QPCR检测、错位Barcode比例等质量控制标准"
    priority: "critical"
    compliance_target: 1.0
    doc_section: "质量控制要求"
    doc_reference: "docs/排机规则文档.md#质量控制要求"
    details:
      sequencing_quality_requirements:
        - library_type: "PE150测序"
          requirement: "双端质量 > 85%"
        - library_type: "3'单细胞类型"
          requirement: "R2质量 > 85%"
        - library_type: "5'单细胞类型"
          requirement: "R1质量 > 85%"
        - library_type: "未注明单细胞类型"
          requirement: "平均质量 > 70%"
      quality_failure_handling: "降低非均衡文库类型比例"
      output_requirements:
        - "全部样本真实产率趋近1"
        - "CV值 < 1.15（lane总下单数据量/lane总合同数据量），最大误差15%以内，越小越好"
      qpcr_molarity_detection:
        process: "T7工序"
        threshold: 1.5
        action: "QPCR摩尔浓度 ≤ 1.5的文库需告知实验员（不影响排机规则）"
      misaligned_barcode_ratio:
        applicable_process: "PE250工序"
        condition: "该类型总数据量占整条Lane数据量的比例 ≥ 85%时适用该规则"
        rules:
          - barcode_ratio: "≥ 85%"
            lane_capacity: 400
            phix_add: "不添加PhiX"
          - barcode_ratio: "70-85%"
            lane_capacity: 410
            phix_add: "添加5%PhiX"
          - barcode_ratio: "< 70%"
            lane_capacity: 420
            phix_add: "添加33%PhiX"
        note: "根据错位Barcode比例调整Lane数据量和PhiX添加量，详细数据量规则见规则1中的Novaseq PE250工序部分"

  - rule_id: "R19"
    rule_name: "产出评判标准"
    description: "有效合同总量、真实产率、溢出比、产出稳定性等评判指标"
    priority: "high"
    compliance_target: 0.95
    doc_section: "产出评判标准"
    doc_reference: "docs/排机规则文档.md#产出评判标准"
    details:
      valid_contract_total:
        target: "值 ≥ 合同数据量，越接近越好"
        description: "衡量排机效果的核心指标，确保满足合同数据量要求"
      real_yield_rate:
        target: "≥ 1，越接近1越好"
        formula: "真实产率 = 实际产出量 / 预期产出量"
        description: "衡量测序产出效率的指标"
      overflow_ratio:
        target: "越接近0越好"
        formula: "溢出比 = (测序产出量 - 有效产出量) / 合同数据量"
        description: "衡量数据浪费程度，越低越经济"
      output_stability_indicators:
        - "全部样本真实产率趋近1"
        - "CV值 < 1.15（lane总下单数据量/lane总合同数据量），最大误差15%以内，越小越好"

  - rule_id: "R20"
    rule_name: "特殊限制条件"
    description: "甲基化文库特殊处理、T7-C4工序特殊规则、库检结果要求等"
    priority: "high"
    compliance_target: 0.95
    doc_section: "特殊限制条件"
    doc_reference: "docs/排机规则文档.md#特殊限制条件"
    details:
      library_type_exclusion_rules:
        strict_restrictions:
          - library: "10x HD Visium空间转录组文库(新)"
            forbidden_with:
              - "10X转录组-3'文库"
              - "10X转录组-3'膜蛋白文库"
              - "墨卓转录组-3端文库"
          - library: "10X ATAC文库"
            forbidden_with:
              - "10x_cellranger拆分方式的文库"
            note: "不排同Run"
      methylation_library_special_handling:
        - "甲基化文库自主包Lane时，添加8.33% PhiX"
        - "含甲基化文库且数据量占比 ≤ 160G时，T7机器Lane数据量调整为1600G"
      t7_c4_process_special_rules:
        data_volume_rules:
          - machine: "T7-C4"
            lane_capacity: 4500
            method: "S4"
            description: "标准T7-C4工序"
          - machine: "T7-Stereo-FFPE"
            lane_capacity: 5000
            method: "Stereo FFPE"
            description: "FFPE样本空间转录组"
          - machine: "T7-Stereo"
            lane_capacity: 4000
            method: "StereoV1_2/V1_3"
            description: "标准空间转录组"
        mixing_rules:
          - condition: "cDNA与oligo混排时"
            rule: "oligo上限数据量 < 700G"
          - condition: "仅cDNA排机"
            rule: "无限制"
          - condition: "仅oligo排机"
            rule: "无限制"
      library_inspection_requirements:
        - "库检结果要求不为0"
        - "T7工序的文库，QPCR摩尔浓度 ≤ 1.5需特别告知实验员"

