# 业务规则配置文件
# 创建时间：2025-10-09 10:00:00
# 更新时间：2025-12-01 10:00:00
# 对应文档: docs/排机规则文档.md
# 
# 规则管理原则:
# 1. 文档是权威来源，配置从文档同步
# 2. 代码从配置读取，避免硬编码
# 3. 定期验证配置与文档一致性

rules:
  - rule_id: "R1"
    rule_name: "合同数据量校验"
    description: "所有工序的Lane数据量基准，根据机器类型、优先级档位和文库类型动态调整，约半月一次调整"
    priority: "critical"
    compliance_target: 1.0
    doc_section: "数据量校验规则"
    doc_reference: "docs/排机规则文档.md#合同数据量校验-规则1"
    details:
      rule_type: "可变规则，同算法"
      scope: "所有工序"
      data_source: "天津-规则表6：生产自主包Lane/散样排机的Lane数据量"
      update_frequency: "约半月一次，每次增加10-15G"
      calculation_basis: "总数据量按合同数据量进行计算"
      rule_description:
        - "所有工序都存在此规则"
        - "需要补齐合同数据量规则"
        - "总数据量按合同数据量进行计算"
        - "Lane数据量会经常变化（看CV值和产出均一性），约半月一次，每次增加10-15G"
        - "合同数据量对应选择文库池中'合同数据量'字段（前端下单需要测序的数据量）"
        - "Lane数据量是根据不同工序和机器类型的lane产出情况来设定的"
      key_machines:
        - machine: "Nova X-10B"
          capacity: 380.0
          tolerance: 10.0
          lanes: 8
          process: "Novaseq X Plus-PE150"
        - machine: "Nova X-25B"
          capacity: 975.0
          tolerance: 10.0
          lanes: 8
          process: "Novaseq X Plus-PE150"
          min_data: 1150
      priority_tier_adjustments:
        - tier: "临检"
          condition: "lane中临检文库>100G"
          capacity: 780
          condition2: "lane中临检文库<100G"
          capacity2: 962.5
        - tier: "YC"
          condition: "lane中YC文库>100G"
          capacity: 810
          condition2: "lane中YC文库<100G"
          capacity2: 962.5
      special_library_configs:
        - type: "10X文库"
          capacity: 930
          note: "自主包lane"
        - type: "甲基化文库"
          capacity: 960
          note: "自主包lane，添加8.33%phix"
      complete_process_tables:
        - process: "Novaseq PE150"
          process_code: 405
          tables:
            - lab: "天津"
              tier: "临检"
              library_type: "S"
              seq_mode: "3.0T"
              lane_capacity: 780
              fc_capacity: 3120
              tolerance: "±10G"
              lanes: 4
              method: "S4 XP"
              min_data: ">100G"
              condition: "lane中临检文库>100G时，合同数据量按780G/lane"
            - lab: "天津"
              tier: "临检"
              library_type: "S"
              seq_mode: "3.6T-New"
              lane_capacity: 880
              fc_capacity: 3520
              tolerance: "±10G"
              lanes: 4
              method: "S4 XP"
              min_data: "<100G"
              condition: "lane中临检文库<100G时，合同数据量按962.5G/lane"
            - lab: "天津"
              tier: "YC"
              library_type: "S"
              seq_mode: "3.2T"
              lane_capacity: 810
              fc_capacity: 3240
              tolerance: "±10G"
              lanes: 4
              method: "S4 XP"
              min_data: ">100G"
              condition: "lane中YC文库>100G时，合同数据量按810G/lane"
            - lab: "天津"
              tier: "YC"
              library_type: "S"
              seq_mode: "3.6T-New"
              lane_capacity: 880
              fc_capacity: 3520
              tolerance: "±10G"
              lanes: 4
              method: "S4 XP"
              min_data: "<100G"
              condition: "lane中YC文库<100G时，合同数据量按962.5G/lane"
            - lab: "天津"
              tier: "其他"
              library_type: "S"
              seq_mode: "3.6T-New"
              lane_capacity: 930
              fc_capacity: 3720
              tolerance: "±10G"
              lanes: 4
              method: "S4 XP"
              condition: "10X文库自主包lane"
            - lab: "天津"
              tier: "其他"
              library_type: "S"
              seq_mode: "3.6T-New"
              lane_capacity: 960
              fc_capacity: 3840
              tolerance: "±10G"
