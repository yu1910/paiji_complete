  # Novaseq SE50 工序（工序编码418）
  novaseq_se50:
    workflow_code: 418
    workflow_name: "Novaseq SE50"
    machine_type: "Novaseq"
    sequencing_strategy: "SE50"
    mixing_allowed: true
    laboratory: "天津"
    
    configurations:
      - priority: "其他"
        product_line: ["S"]
        lane_volume_gb: 435
        fc_volume_gb: 870
        float_range_gb: 10
        lane_count: 2
        loading_method: "S4 XP"

  # Novaseq PE250 工序（工序编码419）
  novaseq_pe250:
    workflow_code: 419
    workflow_name: "Novaseq PE250"
    machine_type: "Novaseq"
    sequencing_strategy: "PE250"
    mixing_allowed: true
    laboratory: "天津"
    
    configurations:
      - priority: "其他"
        product_line: ["S"]
        lane_volume_gb: 400
        fc_volume_gb: 800
        float_range_gb: 10
        lane_count: 2
        loading_method: "S4 XP"
        condition: "错位barcode数据量比例≥85%，不添加phix"
        
      - priority: "其他"
        product_line: ["S"]
        lane_volume_gb: 410
        fc_volume_gb: 820
        float_range_gb: 10
        lane_count: 2
        loading_method: "S4 XP"
        condition: "85%＞错位barcode数据量比例≥70%，添加5%phix"
        
      - priority: "其他"
        product_line: ["S"]
        lane_volume_gb: 420
        fc_volume_gb: 840
        float_range_gb: 10
        lane_count: 2
        loading_method: "S4 XP"
        condition: "70%＞错位barcode数据量比例，添加33%phix"

  # Novaseq PE50 工序（工序编码426）
  novaseq_pe50:
    workflow_code: 426
    workflow_name: "Novaseq PE50"
    machine_type: "Novaseq"
    sequencing_strategy: "PE50"
    mixing_allowed: true
    laboratory: "天津"
    
    configurations:
      - priority: "其他"
        product_line: ["S"]
        lane_volume_gb: 400
        fc_volume_gb: 800
        float_range_gb: 10
        lane_count: 2
        loading_method: "S4 XP"

