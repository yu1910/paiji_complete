      - priority: "其他"
        product_line: ["S", "Z", "ZS"]
        machine_type: "SURFSEQ-Q"
        sequencing_mode: "3.6T-New"
        lane_volume_gb: 750
        fc_volume_gb: 6000
        float_range_gb: 10
